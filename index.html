<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Niimbot Label Designer</title>
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <div id="app">
    <header id="toolbar">
      <div class="toolbar-group">
        <select id="template-picker"></select>
        <button id="new-btn" class="btn-icon" title="New template">+</button>
        <button id="rename-btn" class="btn-icon" title="Rename">✎</button>
        <button id="delete-btn" class="btn-icon btn-danger" title="Delete template">✕</button>
      </div>
      <div class="toolbar-sep"></div>
      <div class="toolbar-group">
        <label class="toolbar-label">Size</label>
        <select id="label-size">
          <option value="50x30">50×30 mm (landscape)</option>
          <option value="30x50">30×50 mm (portrait)</option>
          <option value="30x30">30×30 mm (2× sub-label)</option>
        </select>
        <select id="sub-label" class="hidden">
          <option value="top">Top (30×15 mm)</option>
          <option value="bottom">Bottom (30×15 mm)</option>
        </select>
      </div>
      <div class="toolbar-sep toolbar-push"></div>
      <div class="toolbar-group">
        <button id="layout-btn" class="btn-icon" title="Toggle split direction">⇅</button>
      </div>
      <div class="toolbar-group">
        <span id="bt-status">
          <span id="bt-dot" class="dot"></span>
          <span id="bt-text">Not connected</span>
        </span>
        <button id="connect-btn" class="btn-primary btn-sm">Connect B1</button>
        <button id="print-btn" class="btn-primary btn-sm" disabled>Print</button>
      </div>
    </header>

    <main id="workspace">
      <div id="editor-panel">
        <div id="editor-split">
          <div id="html-editor-host" class="editor-host">
            <div class="editor-label">HTML</div>
            <div id="html-editor-container" class="editor-inner"></div>
          </div>
          <div id="resize-handle"></div>
          <div id="ts-editor-host" class="editor-host">
            <div class="editor-label">TypeScript</div>
            <div id="ts-editor-container" class="editor-inner"></div>
          </div>
        </div>
      </div>
      <aside id="preview-pane">
        <div id="label-wrapper">
          <div id="label-frame">
            <canvas id="preview-canvas"></canvas>
          </div>
        </div>
        <p id="preview-info"></p>
        <div id="messages"></div>
      </aside>
    </main>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
